name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install ruff
        run: uv tool install ruff
      - name: Run ruff check
        run: uv tool run ruff check .
      - name: Run ruff format check
        run: uv tool run ruff format --check .

  dbt-parse:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.10
        ports:
          - "8123:8123"
          - "9000:9000"
        options: >-
          --health-cmd "wget --spider -q http://localhost:8123/ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          CLICKHOUSE_DB: noaa_staging
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: changeme
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dbt dependencies
        working-directory: transform
        run: |
          uv sync --no-install-project
      - name: Setup dbt profiles
        working-directory: transform
        run: cp profiles.yml.example profiles.yml
      - name: Wait for ClickHouse
        run: |
          for i in $(seq 1 30); do
            wget -q -O- http://localhost:8123/ping && break || sleep 2
          done
      - name: Create ClickHouse databases
        run: |
          curl -s http://localhost:8123/ --data "CREATE DATABASE IF NOT EXISTS noaa_raw" -u "default:changeme"
          curl -s http://localhost:8123/ --data "CREATE DATABASE IF NOT EXISTS noaa_staging" -u "default:changeme"
          curl -s http://localhost:8123/ --data "CREATE DATABASE IF NOT EXISTS noaa_marts" -u "default:changeme"
          curl -s http://localhost:8123/ --data "CREATE DATABASE IF NOT EXISTS noaa_ops" -u "default:changeme"
      - name: dbt deps
        working-directory: transform
        run: uv run --no-sync dbt deps
      - name: dbt parse
        working-directory: transform
        run: uv run --no-sync dbt parse --no-partial-parse
        env:
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_HTTP_PORT: "8123"
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: changeme

  yaml-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install yamllint
        run: uv tool install yamllint
      - name: Lint playground queries YAML
        run: |
          uv tool run yamllint -d relaxed playground/queries/ || true
      - name: Validate Grafana provisioning YAML
        run: |
          uv tool run yamllint -d relaxed docker/grafana/provisioning/ || true

apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse-noaa
    isDefault: true
    jsonData:
      host: clickhouse
      port: 9000
      username: default
      defaultDatabase: noaa_raw
      protocol: native
      secure: false
      dialTimeout: 10
      queryTimeout: 60
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD:-changeme}
    editable: true
